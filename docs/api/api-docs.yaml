openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/v1/users/{username}:
    get:
      tags:
      - user-controller
      summary: Get user info by username with optional display parameter
      operationId: getUserByUsername
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      - name: display
        in: query
        required: false
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 10
      responses:
        "200":
          description: User info retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad request
          content:
            '*/*':
              schema:
                type: object
        "401":
          description: Unauthorized access
          content:
            '*/*':
              schema:
                type: object
        "403":
          description: Forbidden access
          content:
            '*/*':
              schema:
                type: object
        "404":
          description: User not found
          content:
            '*/*':
              schema:
                type: object
    put:
      tags:
      - user-controller
      summary: Update user info by username
      operationId: updateUser
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
        required: true
      responses:
        "200":
          description: User info updated successfully
          content:
            '*/*':
              schema:
                type: object
        "400":
          description: Bad request
          content:
            '*/*':
              schema:
                type: object
        "403":
          description: Forbidden access
          content:
            '*/*':
              schema:
                type: object
        "404":
          description: User not found
          content:
            '*/*':
              schema:
                type: object
    delete:
      tags:
      - user-controller
      summary: Delete user by username (admin only)
      operationId: deleteUserByUsername
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: User deleted successfully
          content:
            '*/*':
              schema:
                type: object
        "400":
          description: Bad request
          content:
            '*/*':
              schema:
                type: object
  /api/v1/users/{username}/password:
    put:
      tags:
      - user-controller
      summary: Change user password by admin
      operationId: adminChangeUserPassword
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
        required: true
      responses:
        "200":
          description: Password changed successfully
          content:
            '*/*':
              schema:
                type: object
        "400":
          description: Bad request
          content:
            '*/*':
              schema:
                type: object
  /api/v1/users/{username}/checkin:
    put:
      tags:
      - user-controller
      summary: Update own's last online timestamp
      operationId: updateLastOnline
      responses:
        "200":
          description: Last online timestamp updated successfully
        "400":
          description: Bad request
        "403":
          description: Forbidden access
  /api/v1/users/me/password:
    put:
      tags:
      - user-controller
      summary: Change password for current user
      operationId: changePassword
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
        required: true
      responses:
        "200":
          description: Password changed successfully
          content:
            '*/*':
              schema:
                type: object
        "400":
          description: Bad request
          content:
            '*/*':
              schema:
                type: object
        "401":
          description: Unauthorized access
          content:
            '*/*':
              schema:
                type: object
        "403":
          description: Forbidden access
          content:
            '*/*':
              schema:
                type: object
        "422":
          description: "Unprocessable entity: current password incorrect"
          content:
            '*/*':
              schema:
                type: object
  /api/v1/users/me/ingredients:
    get:
      tags:
      - user-controller
      summary: Get your stored ingredients
      operationId: getStoredIngredients
      responses:
        "200":
          description: Stored ingredients retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ingredient"
        "400":
          description: Bad request
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ingredient"
    put:
      tags:
      - user-controller
      summary: Add an ingredient to your stored ingredients
      operationId: addStoredIngredient
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Ingredient"
        required: true
      responses:
        "200":
          description: Ingredient added successfully
        "400":
          description: Bad request
  /api/v1/users/me/ingredients/remove:
    put:
      tags:
      - user-controller
      summary: Delete a user stored ingredient by ID
      operationId: deleteStoredIngredient
      requestBody:
        content:
          application/json:
            schema:
              type: integer
              format: int64
        required: true
      responses:
        "200":
          description: Ingredient deleted successfully
        "400":
          description: Bad request
  /api/v1/users/me/ingredients/clear:
    put:
      tags:
      - user-controller
      summary: Clear user's ingredient pantry
      operationId: clearStoredIngredients
      responses:
        "200":
          description: Stored ingredients cleared successfully
        "400":
          description: Bad request
  /api/v1/reviews:
    get:
      tags:
      - review-controller
      summary: Get paged reviews for a recipe
      operationId: getReviews
      parameters:
      - name: recipeId
        in: query
        required: true
        schema:
          type: integer
          format: int64
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 10
      responses:
        "200":
          description: Reviews retrieved successfully
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: object
        "400":
          description: Invalid input
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: object
        "404":
          description: Recipe not found
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: object
    put:
      tags:
      - review-controller
      summary: Submit a review for a recipe
      operationId: submitReview
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Review"
        required: true
      responses:
        "200":
          description: Review submitted successfully
          content:
            '*/*':
              schema:
                type: object
        "400":
          description: Invalid input
          content:
            '*/*':
              schema:
                type: object
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                type: object
        "404":
          description: Recipe not found
          content:
            '*/*':
              schema:
                type: object
  /api/v1/reviews/{reviewId}:
    get:
      tags:
      - review-controller
      summary: Get a review by ID
      operationId: getReviewById
      parameters:
      - name: reviewId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Review found
          content:
            '*/*':
              schema:
                type: object
        "404":
          description: Review not found
          content:
            '*/*':
              schema:
                type: object
    put:
      tags:
      - review-controller
      summary: Update a review by ID
      operationId: updateReview
      parameters:
      - name: reviewId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Review"
        required: true
      responses:
        "200":
          description: Review updated successfully
          content:
            '*/*':
              schema:
                type: object
        "400":
          description: Invalid input
          content:
            '*/*':
              schema:
                type: object
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                type: object
        "404":
          description: Review not found
          content:
            '*/*':
              schema:
                type: object
    delete:
      tags:
      - review-controller
      summary: Delete a review
      operationId: deleteReview
      parameters:
      - name: reviewId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Review deleted successfully
          content:
            '*/*':
              schema:
                type: object
        "404":
          description: Review not found
          content:
            '*/*':
              schema:
                type: object
        "403":
          description: Unauthorized to delete this review
          content:
            '*/*':
              schema:
                type: object
  /api/v1/recipes:
    get:
      tags:
      - landing-controller
      summary: Get newest recipes
      operationId: getNewestRecipes
      parameters:
      - name: order
        in: query
        required: true
        schema:
          type: string
      - name: size
        in: query
        required: true
        schema:
          type: integer
          format: int32
      - name: page
        in: query
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: Found recipes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe_BasicInfo"
        "404":
          description: No recipes found
    put:
      tags:
      - recipe-controller
      summary: Create a new recipe
      operationId: createRecipe
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: object
        required: true
      responses:
        "201":
          description: Recipe created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "400":
          description: Invalid input
        "401":
          description: Unauthorized
  /api/v1/recipes/{id}:
    get:
      tags:
      - recipe-controller
      summary: Get recipe by ID
      operationId: getRecipeById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Found the recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "404":
          description: Recipe not found
    put:
      tags:
      - recipe-controller
      summary: Update an existing recipe
      operationId: updateRecipe
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: object
        required: true
      responses:
        "200":
          description: Recipe updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "404":
          description: Recipe not found
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - Not the recipe author
    delete:
      tags:
      - recipe-controller
      summary: Delete a recipe
      operationId: deleteRecipe
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Recipe deleted successfully
          content:
            '*/*':
              schema:
                type: object
        "403":
          description: Forbidden - Not the recipe author
        "404":
          description: Recipe not found
  /api/v1/ingredients:
    get:
      tags:
      - ingredient-controller
      summary: Get paged ingredients (ordered by id desc)
      operationId: getIngredients
      parameters:
      - name: pageable
        in: query
        required: true
        schema:
          $ref: "#/components/schemas/Pageable"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageIngredient"
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageIngredient"
    put:
      tags:
      - ingredient-controller
      summary: Create a new ingredient (admin only)
      operationId: createIngredient
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Ingredient"
        required: true
      responses:
        "201":
          description: Ingredient created successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Ingredient"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Ingredient"
  /api/v1/ingredients/{id}:
    get:
      tags:
      - ingredient-controller
      summary: Get ingredient by ID
      operationId: getIngredientById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Ingredient found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Ingredient"
        "404":
          description: Ingredient not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Ingredient"
    put:
      tags:
      - ingredient-controller
      summary: Update an existing ingredient (admin only)
      operationId: updateIngredient
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Ingredient"
        required: true
      responses:
        "200":
          description: Ingredient updated successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Ingredient"
        "404":
          description: Ingredient not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Ingredient"
    delete:
      tags:
      - ingredient-controller
      summary: Delete an ingredient by ID
      operationId: deleteIngredient
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Ingredient deleted successfully
        "404":
          description: Ingredient not found
        "403":
          description: Forbidden
  /api/v1/collections:
    get:
      tags:
      - recipe-collection-controller
      summary: Get all collections for a user
      operationId: getUserCollections
      parameters:
      - name: username
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Collections retrieved successfully
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeCollection_BasicInfo"
        "404":
          description: User not found
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeCollection_BasicInfo"
    put:
      tags:
      - recipe-collection-controller
      summary: Create a new collection
      operationId: createCollection
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
        required: true
      responses:
        "201":
          description: Collection created successfully
          content:
            '*/*':
              schema:
                type: object
        "400":
          description: Bad request
          content:
            '*/*':
              schema:
                type: object
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                type: object
  /api/v1/collections/{id}:
    get:
      tags:
      - recipe-collection-controller
      summary: Get collection by ID
      operationId: getCollectionById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Collection retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RecipeCollection_BasicInfo"
        "404":
          description: Collection not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RecipeCollection_BasicInfo"
    put:
      tags:
      - recipe-collection-controller
      summary: "Modify collection: add/remove recipe (recipeId query param), update\
        \ title (title in body)"
      operationId: modifyCollection
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: recipeId
        in: query
        required: false
        schema:
          type: integer
          format: int64
      - name: remove
        in: query
        required: false
        schema:
          type: boolean
          default: false
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
      responses:
        "200":
          description: Collection modified successfully
          content:
            '*/*':
              schema:
                type: object
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                type: object
        "404":
          description: Collection or recipe not found
          content:
            '*/*':
              schema:
                type: object
    delete:
      tags:
      - recipe-collection-controller
      summary: Delete collection
      operationId: deleteCollection
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "204":
          description: Collection deleted successfully
          content:
            '*/*':
              schema:
                type: object
        "400":
          description: Cannot delete favorites collection
          content:
            '*/*':
              schema:
                type: object
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                type: object
        "404":
          description: Collection not found
          content:
            '*/*':
              schema:
                type: object
  /api/v1/collections/liked:
    get:
      tags:
      - recipe-collection-controller
      summary: Get favorites collection for own user
      operationId: getFavoritesCollection
      parameters:
      - name: username
        in: query
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Favorites collection retrieved successfully
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RecipeCollection"
        "401":
          description: Unauthorized
        "404":
          description: User not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RecipeCollection"
    put:
      tags:
      - recipe-collection-controller
      summary: Add recipe to favorites
      operationId: addRecipeToFavorites
      parameters:
      - name: recipeId
        in: query
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
        required: true
      responses:
        "200":
          description: Recipe added to favorites successfully
          content:
            '*/*':
              schema:
                type: object
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                type: object
        "404":
          description: Recipe not found
          content:
            '*/*':
              schema:
                type: object
  /api/v1/auth/signup:
    put:
      tags:
      - auth-controller
      summary: User registration endpoint
      operationId: signup
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
        required: true
      responses:
        "200":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid registration data
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v1/auth/refresh:
    put:
      tags:
      - auth-controller
      summary: Refresh token
      operationId: refreshToken
      parameters:
      - name: refreshToken
        in: cookie
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized access
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v1/auth/logout:
    put:
      tags:
      - auth-controller
      summary: Logout
      operationId: logOut
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized access
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v1/auth/login:
    put:
      tags:
      - auth-controller
      summary: User login endpoint
      operationId: login
      parameters:
      - name: accessToken
        in: cookie
        required: false
        schema:
          type: string
      - name: refreshToken
        in: cookie
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
        required: true
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid credentials
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v1/users/change-password:
    post:
      tags:
      - user-controller
      summary: Change password by email or token
      operationId: recoverOrChangePassword
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                type: string
        required: true
      responses:
        "200":
          description: Password recovery email sent or password changed successfully
          content:
            '*/*':
              schema:
                type: object
        "400":
          description: Bad request
          content:
            '*/*':
              schema:
                type: object
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                type: object
        "404":
          description: User not found
          content:
            '*/*':
              schema:
                type: object
        "500":
          description: Internal server error
          content:
            '*/*':
              schema:
                type: object
  /api/v1/users/search:
    get:
      tags:
      - user-controller
      summary: Search users by query
      operationId: searchUsers
      parameters:
      - name: query
        in: query
        required: false
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 9
      responses:
        "200":
          description: Users retrieved successfully
          content:
            '*/*':
              schema:
                type: object
        "400":
          description: Bad request
          content:
            '*/*':
              schema:
                type: object
  /api/v1/users/me:
    get:
      tags:
      - user-controller
      summary: Get current logged-in user info
      operationId: getCurrentUser
      responses:
        "200":
          description: User info retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad request
          content:
            '*/*':
